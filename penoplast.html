<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Пенополистирол | BELENSTROY</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            background-attachment: fixed;
            font-family: 'Montserrat', sans-serif;
        }
        .product-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            max-width: 900px;
            margin: 50px auto;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .header-box { border-left: 10px solid #6b0100; padding-left: 20px; margin-bottom: 40px; }
        h1 { color: #6b0100; font-weight: 800; text-transform: uppercase; margin: 0; }
        .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .spec-item { background: #6b0100; color: #fff; padding: 20px; border-radius: 15px; }
        .spec-item b { color: #ffbcbc; display: block; margin-bottom: 5px; }
        .back-link { display: inline-block; margin-top: 40px; color: #6b0100; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>
    <div class="product-container">
        <div class="header-box">
            <h1>Пенополистирол</h1>
            <p>Экономичное решение для быстрой постройки</p>
        </div>

        <div class="specs-grid">
            <div class="spec-item"><b>Плотность</b> 8-20 кг/м³</div>
            <div class="spec-item"><b>Типы замков</b> Z-Lock, S-образный</div>
            <div class="spec-item"><b>Толщина металла</b> 0.40 - 0.70мм</div>
            <div class="spec-item"><b>Толщина панели</b> 50мм - 200мм</div>
        </div>

        <a href="stena.html" class="back-link">← Назад к выбору наполнителя</a>
    </div>
</body>
</html>
