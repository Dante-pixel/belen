<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Кровельная Минвата | BELENSTROY</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: linear-gradient(135deg, #4b4b4b 0%, #7d7d7d 50%, #f4f4f4 100%); background-attachment: fixed; font-family: 'Montserrat', sans-serif; }
        .product-container { background: rgba(255, 255, 255, 0.9); padding: 60px 40px; max-width: 900px; margin: 50px auto; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .header-box { border-left: 10px solid #6b0100; padding-left: 20px; margin-bottom: 40px; }
        h1 { color: #6b0100; font-weight: 800; text-transform: uppercase; margin: 0; }
        .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .spec-item { background: #6b0100; color: #fff; padding: 20px; border-radius: 15px; }
        .spec-item b { color: #ffbcbc; display: block; margin-bottom: 5px; }
        .back-link { display: inline-block; margin-top: 40px; color: #6b0100; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>
    <div class="product-container">
        <div class="header-box">
            <h1>Кровельная Минвата</h1>
            <p>Максимальная огнестойкость для крыши</p>
        </div>
        <div class="specs-grid">
            <div class="spec-item"><b>Плотность</b> 110-125 кг/м³</div>
            <div class="spec-item"><b>Тип замка</b> Roof-Lock (нахлест)</div>
            <div class="spec-item"><b>Толщина</b> 50мм - 250мм</div>
            <div class="spec-item"><b>Горючесть</b> НГ (не горит)</div>
        </div>
        <a href="krovlya.html" class="back-link">← Назад к кровельным панелям</a>
    </div>
</body>
</html>
