<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор панелей | BELENSTROY</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        .selection-container {
            padding: 80px 20px;
            text-align: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        /* Сетка для двух карточек */
        .selection-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 50px;
        }
        /* Стиль карточки как на вашем фото */
        .card-item {
            background: #6b0100; /* Ваш темно-красный цвет */
            border-radius: 30px;
            width: 350px;
            overflow: hidden;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .card-item:hover { transform: translateY(-10px); }
        .img-white-bg {
            background: #fff;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .img-white-bg img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .card-item h2 {
            color: #fff;
            padding: 20px;
            font-size: 22px;
            margin: 0;
            font-weight: 800;
        }
        .btn-black {
            background: #111;
            color: #fff;
            padding: 12px 40px;
            border-radius: 25px;
            display: inline-block;
            margin-bottom: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body style="background: #f4f4f4; font-family: 'Montserrat', sans-serif; margin: 0;">

<div class="selection-container">
    <h1 style="color: #6b0100; font-weight: 800; text-transform: uppercase;">Выберите тип панелей</h1>

    <div class="selection-grid">
        <a href="stena.html" class="card-item">
            <div class="img-white-bg">
                <img src="photo/sstena.jpg" alt="Стеновые панели">
            </div>
            <h2>Стеновые сэндвич-панели</h2>
            <div class="btn-black">Подробнее</div>
        </a>

        <a href="krovlya.html" class="card-item">
            <div class="img-white-bg">
                <img src="photo/krp.jpg" alt="Кровельные панели">
            </div>
            <h2>Кровельные сэндвич-панели</h2>
            <div class="btn-black">Подробнее</div>
        </a>
    </div>

    <p style="margin-top: 50px;">
        <a href="index.html" style="color: #6b0100; font-weight: bold; text-decoration: none;">← Вернуться на главную</a>
    </p>
</div>

</body>
</html>
