<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор типа панелей | BELENSTROY</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        .panels-selection {
            padding: 80px 20px;
            text-align: center;
            max-width: 1100px;
            margin: 0 auto;
        }
        .selection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }
        .selection-card {
            background: #6b0100; /* Ваш темно-красный цвет */
            border-radius: 30px;
            overflow: hidden;
            transition: 0.3s;
            text-decoration: none;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .selection-card:hover {
            transform: translateY(-10px);
        }
        .img-box {
            background: #fff;
            width: 100%;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .img-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Чтобы фото не обрезалось */
        }
        .selection-card h2 {
            color: #fff;
            padding: 25px 15px 15px;
            margin: 0;
            font-size: 20px;
            text-transform: uppercase;
            font-weight: 800;
        }
        .btn-inner {
            background: #111;
            color: #fff;
            padding: 12px 40px;
            border-radius: 25px;
            margin-bottom: 25px;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body style="background: #f4f4f4; font-family: 'Montserrat', sans-serif; margin: 0;">

<div class="panels-selection">
    <h1 style="color: #6b0100; font-weight: 800; text-transform: uppercase;">Выберите тип панелей</h1>

    <div class="selection-grid">
        <a href="stena.html" class="selection-card">
            <div class="img-box">
                <img src="wall ssp.jpg" alt="Стеновые панели">
            </div>
            <h2>Стеновые сэндвич-панели</h2>
            <div class="btn-inner">Подробнее</div>
        </a>

        <a href="krovlya.html" class="selection-card">
            <div class="img-box">
                <img src="krp.jpg" alt="Кровельные панели">
            </div>
            <h2>Кровельные сэндвич-панели</h2>
            <div class="btn-inner">Подробнее</div>
        </a>
    </div>

    <p style="margin-top: 60px;">
        <a href="index.html" style="color: #6b0100; font-weight: bold; text-decoration: none; border-bottom: 2px solid #6b0100; padding-bottom: 5px;">
            ← Вернуться на главную
        </a>
    </p>
</div>

</body>
</html>
